<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mọt sách Tiếng Nhật</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
body {font-family: 'Plus Jakarta Sans', sans-serif;}
</style>
</head>

<body class="bg-gray-200 flex justify-center">

<div class="w-full max-w-[420px] bg-white min-h-screen p-5 flex flex-col">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h2 class="font-bold text-lg">Mọt sách Tiếng Nhật</h2>
</div>

<!-- HERO -->
<div class="mb-6">
<h1 class="text-3xl font-extrabold mb-2">Học JLPT hiệu quả</h1>
<p class="text-gray-500">Mình chia sẻ miễn phí kinh nghiệm thi JLPT, đề thi các năm và tài liệu N5 → N1. Nếu bạn thấy hữu ích, hãy ủng hộ mình ❤️</p>
</div>

<!-- LINK BIO -->
<a href="https://beacons.ai/motsachtiengnhat" target="_blank" class="mb-6 block text-center bg-gray-100 p-3 rounded-xl font-semibold">
📚 Xem tài liệu JLPT (N5 - N3)
</a>

<!-- DONATION -->
<h2 class="font-bold mb-3">Chọn gói ủng hộ ❤️</h2>

<div class="grid grid-cols-2 gap-3 mb-6">
<button class="donate-btn bg-gray-100 p-4 rounded-xl" data-amount="50k">50k<br><span class="text-sm text-gray-500">Cà phê ☕</span></button>
<button class="donate-btn bg-gray-100 p-4 rounded-xl" data-amount="100k">100k<br><span class="text-sm text-gray-500">Ủng hộ tài liệu</span></button>
<button class="donate-btn bg-gray-100 p-4 rounded-xl" data-amount="200k">200k<br><span class="text-sm text-gray-500">Động lực lớn</span></button>
<button class="donate-btn bg-gray-100 p-4 rounded-xl" data-amount="500k">500k<br><span class="text-sm text-gray-500">Support mạnh 🔥</span></button>
</div>

<!-- CTA -->
<button id="openQR" class="bg-orange-500 text-white p-4 rounded-full font-bold">
Ủng hộ ngay
</button>

</div>

<!-- POPUP QR -->
<div id="qrPopup" class="fixed inset-0 bg-black/50 hidden justify-center items-center">
<div class="bg-white p-5 rounded-2xl text-center w-[90%] max-w-sm">
<h3 class="font-bold text-lg mb-3">Quét QR để ủng hộ ❤️</h3>
<img src="/mnt/data/att.lqGzu7BqfXf0eOeJBsZBanqWsO5GfaCnZWkdz67xdFo.jpg" class="rounded-xl mb-3"/>
<p class="font-semibold">Nguyen Ton Kien</p>
<p class="text-sm">BIDV - 8838325344</p>
<button id="closeQR" class="mt-4 bg-gray-200 px-4 py-2 rounded-xl">Đóng</button>
</div>
</div>

<script>
const openBtn = document.getElementById("openQR");
const popup = document.getElementById("qrPopup");
const closeBtn = document.getElementById("closeQR");

openBtn.onclick = () => popup.classList.remove("hidden");
closeBtn.onclick = () => popup.classList.add("hidden");

// click outside
popup.onclick = (e) => {
  if(e.target === popup) popup.classList.add("hidden");
}
</script>

</body>
</html>
